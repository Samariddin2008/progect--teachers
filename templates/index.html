<!DOCTYPE html>
<html>
<body>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<div class="container">
    <h1>📚 Lessons</h1>

    {% for key, lesson in lessons.items() %}
        <a href="/lesson/{{ key }}">
            <div class="lesson-card">
                <h2>{{ lesson.title }}</h2>
            </div>
        </a>
    {% endfor %}
</div>

</body>
</html>

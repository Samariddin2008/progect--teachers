<!DOCTYPE html>
<html>
<body>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<div class="container">

{% if lesson %}
    <h1>{{ lesson.title }}</h1>

    <img src="{{ url_for('static', filename=lesson.image) }}" width="300">

    <p>{{ lesson.text }}</p>
{% else %}
    <h1>Lesson not found</h1>
{% endif %}

<a href="/" class="back-btn">⬅ Back</a>

</div>

</body>
</html>
